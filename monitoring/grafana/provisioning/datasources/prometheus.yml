# ============================================================================
# Grafana — Auto-provisioned Prometheus Datasource
# ============================================================================
# Grafana reads this on startup so Prometheus is available immediately.
# No manual datasource setup needed.
# ============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus-modelserve
    isDefault: true
    editable: true
