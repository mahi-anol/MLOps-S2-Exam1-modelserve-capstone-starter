groups:
  - name: modelserve_alerts
    rules:
      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, rate(prediction_duration_seconds_bucket[5m])) > 0.5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "P95 prediction latency above 500ms"
          description: "P95 latency is {{ $value }}s"

      - alert: HighErrorRate
        expr: rate(prediction_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Elevated prediction error rate"
          description: "Error rate is {{ $value }}/s"

      - alert: ServiceDown
        expr: up{job="modelserve-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ModelServe API is down"
          description: "FastAPI service unreachable"
