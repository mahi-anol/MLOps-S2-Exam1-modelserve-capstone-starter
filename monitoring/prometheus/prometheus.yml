# ============================================================================
# ModelServe — Prometheus Configuration
# ============================================================================
# Scrapes the FastAPI /metrics endpoint and loads alert rules.
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alert rules from alerts.yml
rule_files:
  - "alerts.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI inference service
  - job_name: "modelserve-api"
    metrics_path: "/metrics"
    scrape_interval: 5s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "modelserve-api"
