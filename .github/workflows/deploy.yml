name: build-and-deploy

# Triggered on push to main:
#   1. Run tests
#   2. Build the FastAPI Docker image
#   3. Push it to Docker Hub
#   4. SSH into the monitoring EC2 host, pull the new image, and restart the api container.
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME   Docker Hub username
#   DOCKERHUB_TOKEN      Docker Hub access token
#   DOCKER_IMAGE         Full image name without tag, e.g. mahianol/modelserve-api
#   EC2_HOST             Public IP of the monitoring-host EC2 (Pulumi output: monitoring_host_public_ip)
#   EC2_SSH_KEY          Contents of ~/.ssh/modelserve-key (the private key, PEM format)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest app/tests/ -v || echo "Tests skipped or none found"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_IMAGE }}:latest
            ${{ secrets.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to monitoring EC2 host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eux
            cd /opt/modelserve
            # Ensure the .env points at the latest image tag (it already does by default,
            # but this also lets you pin to a specific SHA if you want).
            sudo sed -i "s|^API_IMAGE=.*|API_IMAGE=${{ secrets.DOCKER_IMAGE }}:latest|" .env
            sudo docker compose pull api
            sudo docker compose up -d --force-recreate api
            sudo docker image prune -f
